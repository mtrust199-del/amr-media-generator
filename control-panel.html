<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | Amr Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen p-4 md:p-8">

    <header class="max-w-6xl mx-auto flex justify-between items-center mb-6 p-6 glass rounded-2xl">
        <div>
            <h1 class="text-2xl font-bold text-purple-400">لوحة التحكم</h1>
            <p class="text-sm text-gray-400">لوحة التحكم الرئيسية للنظام</p>
        </div>
        <div class="flex gap-2">
            <button onclick="window.location.href='index.html'" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm">العودة للرئيسية</button>
            <button onclick="window.open('http://127.0.0.1:5000/', '_blank')" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm">فتح النظام المحلي</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div class="glass p-6 rounded-2xl text-center">
                <div class="text-3xl font-bold text-blue-400" id="cp-version">...</div>
                <div class="text-xs text-gray-400 mt-1">الإصدار الحالي</div>
            </div>
            <div class="glass p-6 rounded-2xl text-center">
                <div class="text-3xl font-bold text-green-400" id="cp-status">متصل</div>
                <div class="text-xs text-gray-400 mt-1">حالة النظام</div>
            </div>
            <div class="glass p-6 rounded-2xl text-center">
                <div class="text-3xl font-bold text-purple-400" id="cp-platforms">...</div>
                <div class="text-xs text-gray-400 mt-1">المنصات المتاحة</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass rounded-2xl p-6">
                <h2 class="text-lg font-bold mb-4">الإجراءات السريعة</h2>
                <div class="space-y-3">
                    <button onclick="window.open('http://127.0.0.1:5000/', '_blank')" class="w-full px-4 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm font-bold">فتح النظام الأساسي</button>
                    <button onclick="window.open('https://arena.ai/', '_blank')" class="w-full px-4 py-3 bg-indigo-600 hover:bg-indigo-700 rounded-lg text-sm font-bold">Arena.ai</button>
                    <button onclick="window.open('https://mtrust199-del.github.io/temp-mail/', '_blank')" class="w-full px-4 py-3 bg-green-600 hover:bg-green-700 rounded-lg text-sm font-bold">Temp Mail</button>
                </div>
            </div>

            <div class="glass rounded-2xl p-6">
                <h2 class="text-lg font-bold mb-4">سجل النظام</h2>
                <div id="log-box" class="h-48 overflow-y-auto text-[10px] font-mono text-blue-300/60 space-y-1">
                    <div>> Control Panel loaded.</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="max-w-6xl mx-auto mt-8 text-center text-xs text-gray-500">
        <p>Amr Cloud Control © 2026</p>
    </footer>

    <script src="js/main.js"></script>
    <script>
        function addLog(m) {
            const lb = document.getElementById('log-box');
            lb.innerHTML += `<div>> [${new Date().toLocaleTimeString()}] ${m}</div>`;
            lb.scrollTop = lb.scrollHeight;
        }

        // Load version from local backend
        fetch('http://127.0.0.1:5000/version')
            .then(r => r.json())
            .then(d => {
                document.getElementById('cp-version').textContent = d.current_version;
                addLog(`Version: ${d.current_version}`);
            })
            .catch(() => {
                document.getElementById('cp-version').textContent = 'غير متصل';
                addLog('Cannot connect to local backend');
            });

        // Load platforms
        fetch('http://127.0.0.1:5000/get_platforms')
            .then(r => r.json())
            .then(d => {
                document.getElementById('cp-platforms').textContent = Object.keys(d).length;
                addLog(`Platforms loaded: ${Object.keys(d).length}`);
            })
            .catch(() => {
                document.getElementById('cp-platforms').textContent = 'غير متصل';
            });

        addLog('Control Panel initialized');
    </script>
</body>
</html>
