<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Claude | Amr Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background: #0a0e17; color: #c9d1d9; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 12px 20px; background: rgba(13,17,28,0.95); border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 10px; }
        .header h1 { font-size: 14px; font-weight: 700; color: #58a6ff; }
        .header .status { font-size: 11px; color: #3fb950; margin-left: auto; }
        .terminal { flex: 1; overflow-y: auto; padding: 20px; }
        .line { margin-bottom: 10px; line-height: 1.6; font-size: 13px; white-space: pre-wrap; word-break: break-word; }
        .prompt { color: #58a6ff; font-weight: 700; }
        .user { color: #c9d1d9; }
        .assistant { color: #a5f3fc; }
        .error { color: #f85149; }
        .system { color: #8b949e; font-size: 11px; }
        .input-area { padding: 12px 20px; background: rgba(13,17,28,0.95); border-top: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 8px; }
        .input-area .prompt { font-size: 14px; }
        #user-input { flex: 1; background: transparent; border: none; outline: none; color: #c9d1d9; font-family: inherit; font-size: 13px; }
        .btn { background: rgba(88,166,255,0.15); border: 1px solid rgba(88,166,255,0.4); color: #58a6ff; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: inherit; }
        .btn:hover { background: rgba(88,166,255,0.25); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        .typing::after { content: '▋'; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>🖥️ Claude Terminal Chat</h1>
        <span class="status" id="status">● Connected</span>
    </div>

    <div class="terminal" id="terminal">
        <div class="line system">Type /help for commands. Chat with Claude just like in the terminal.</div>
        <div class="line system">──────────────────────────────────────────────</div>
    </div>

    <div class="input-area">
        <span class="prompt">$</span>
        <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off" autofocus>
        <button class="btn" id="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusEl = document.getElementById('status');
        let history = [];
        let historyIdx = -1;

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
            if (e.key === 'ArrowUp') { e.preventDefault(); if (historyIdx < history.length - 1) { historyIdx++; input.value = history[history.length - 1 - historyIdx]; } }
            if (e.key === 'ArrowDown') { e.preventDefault(); if (historyIdx > 0) { historyIdx--; input.value = history[history.length - 1 - historyIdx]; } else { historyIdx = -1; input.value = ''; } }
        });

        function scrollToBottom() { terminal.scrollTop = terminal.scrollHeight; }

        function addLine(text, className) {
            const div = document.createElement('div');
            div.className = 'line ' + (className || '');
            div.textContent = text;
            terminal.appendChild(div);
            scrollToBottom();
        }

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg) return;

            if (msg === '/help') {
                addLine('$ ' + msg, 'prompt');
                addLine('Commands:', 'system');
                addLine('  /help   - Show this help', 'system');
                addLine('  /clear  - Clear terminal', 'system');
                addLine('  /status - Check API status', 'system');
                input.value = '';
                return;
            }
            if (msg === '/clear') {
                terminal.innerHTML = '';
                input.value = '';
                return;
            }
            if (msg === '/status') {
                addLine('$ ' + msg, 'prompt');
                addLine('Checking API status...', 'system');
                fetch('/health').then(r => r.json()).then(d => addLine('OK: ' + JSON.stringify(d), 'assistant')).catch(e => addLine('Error: ' + e, 'error'));
                input.value = '';
                return;
            }

            history.push(msg);
            historyIdx = -1;

            addLine('$ ' + msg, 'prompt');
            addLine('You: ' + msg, 'user');

            input.value = '';
            input.disabled = true;
            sendBtn.disabled = true;
            statusEl.textContent = '● Thinking...';
            statusEl.style.color = '#d29922';

            try {
                const res = await fetch('/chat_api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                if (data.error) {
                    addLine('Error: ' + data.error, 'error');
                } else {
                    addLine('Claude: ' + (data.message || JSON.stringify(data)), 'assistant');
                }
            } catch (e) {
                addLine('Connection error: ' + e.message, 'error');
            }

            input.disabled = false;
            sendBtn.disabled = false;
            statusEl.textContent = '● Connected';
            statusEl.style.color = '#3fb950';
            input.focus();
        }

        // Auto-focus input
        input.focus();
    </script>
</body>
</html>
